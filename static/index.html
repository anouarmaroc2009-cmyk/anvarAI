<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anvar AI - Coding Agent</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
  @keyframes pulse { 0%,100% { transform: scale(1); opacity: .5; } 50% { transform: scale(1.05); opacity: .8; } }
  @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes slideInLeft { from { opacity: 0; transform: translateX(-30px); } to { opacity: 1; transform: translateX(0); } }
  @keyframes slideInRight { from { opacity: 0; transform: translateX(30px); } to { opacity: 1; transform: translateX(0); } }
  @keyframes bounce { 0%,80%,100% { transform: translateY(0); } 40% { transform: translateY(-12px); } }

  :root {
    --bg: #0a0a1a; --surface: rgba(255,255,255,0.04); --border: rgba(255,255,255,0.08);
    --text: #e2e8f0; --text-muted: #94a3b8;
    --accent: #a78bfa; --accent-glow: rgba(167,139,250,0.15);
    --user-bg: linear-gradient(135deg, #7c3aed, #a78bfa); --user-text: #fff;
    --bot-bg: rgba(255,255,255,0.04); --bot-border: rgba(167,139,250,0.15);
    --shadow: 0 4px 24px rgba(0,0,0,0.2);
    --font: 'Inter','Segoe UI',-apple-system,sans-serif; --radius: 16px; --radius-sm: 10px;
  }
  html,body { height: 100%; }
  body {
    font-family: var(--font); background: var(--bg); color: var(--text);
    display: flex; flex-direction: column; overflow: hidden;
  }
  .bg-shapes { position: fixed; inset: 0; pointer-events: none; overflow: hidden; z-index: 0; }
  .bg-shapes .shape { position: absolute; border-radius: 50%; }
  .bg-shapes .shape:nth-child(1) { width: 500px; height: 500px; background: radial-gradient(circle, rgba(124,58,237,0.08), transparent 70%); top: -200px; left: -100px; animation: float 10s ease-in-out infinite; }
  .bg-shapes .shape:nth-child(2) { width: 300px; height: 300px; background: radial-gradient(circle, rgba(167,139,250,0.06), transparent 70%); bottom: 50px; right: -80px; animation: float 12s ease-in-out infinite; animation-delay: -4s; }
  .bg-shapes .shape:nth-child(3) { width: 200px; height: 200px; background: radial-gradient(circle, rgba(99,102,241,0.05), transparent 70%); top: 40%; left: 60%; animation: pulse 8s ease-in-out infinite; }
  header {
    position: relative; z-index: 1; padding: 14px 24px;
    background: var(--surface); backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
  }
  header h1 { font-size: 18px; font-weight: 700; color: var(--text); display: flex; align-items: center; gap: 10px; }
  header h1 .logo { width: 32px; height: 32px; background: linear-gradient(135deg,#7c3aed,#a78bfa); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; color: white; }
  .model-badge { font-size: 11px; background: rgba(167,139,250,0.12); color: var(--accent); padding: 3px 10px; border-radius: 20px; font-weight: 600; letter-spacing: .3px; }
  .header-actions { display: flex; align-items: center; gap: 10px; }
  .btn-outline {
    background: transparent; border: 1px solid var(--border);
    color: var(--text-muted); padding: 7px 16px;
    border-radius: var(--radius-sm); cursor: pointer; font-size: 13px;
    transition: all .3s ease;
  }
  .btn-outline:hover { background: var(--accent-glow); border-color: var(--accent); color: var(--text); }
  #chat {
    position: relative; z-index: 1; flex: 1; overflow-y: auto;
    padding: 20px 24px; display: flex; flex-direction: column; gap: 16px;
    scroll-behavior: smooth;
  }
  #chat::-webkit-scrollbar { width: 5px; }
  #chat::-webkit-scrollbar-thumb { background: rgba(167,139,250,0.3); border-radius: 3px; }
  .msg { display: flex; flex-direction: column; max-width: 80%; animation: slideUp .4s ease; }
  .msg.user { align-self: flex-end; animation-name: slideInRight; }
  .msg.bot { align-self: flex-start; animation-name: slideInLeft; }
  .msg .bubble { padding: 14px 20px; border-radius: var(--radius); font-size: 14px; line-height: 1.7; white-space: pre-wrap; word-wrap: break-word; }
  .msg.user .bubble { background: var(--user-bg); color: var(--user-text); border-bottom-right-radius: 4px; }
  .msg.bot .bubble { background: var(--bot-bg); backdrop-filter: blur(10px); border: 1px solid var(--bot-border); border-bottom-left-radius: 4px; box-shadow: var(--shadow); }
  .msg .bubble code { background: rgba(167,139,250,0.15); color: var(--accent); padding: 2px 6px; border-radius: 4px; font-size: 13px; }
  .msg .bubble pre { background: rgba(0,0,0,0.3); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 14px; margin: 8px 0; overflow-x: auto; font-size: 13px; }
  .msg .bubble pre code { background: none; padding: 0; color: inherit; }
  .tool-indicator { font-size: 12px; color: var(--accent); margin-top: 4px; padding: 4px 10px; background: rgba(167,139,250,0.08); border-radius: 6px; display: inline-block; }
  .typing-indicator { align-self: flex-start; display: flex; align-items: center; gap: 5px; padding: 16px 22px; background: var(--bot-bg); border: 1px solid var(--bot-border); border-radius: var(--radius); border-bottom-left-radius: 4px; box-shadow: var(--shadow); }
  .typing-indicator span { width: 9px; height: 9px; border-radius: 50%; background: var(--accent); animation: bounce 1.4s infinite; opacity: .4; }
  .typing-indicator span:nth-child(2) { animation-delay: .16s; opacity: .6; }
  .typing-indicator span:nth-child(3) { animation-delay: .32s; opacity: .8; }
  .empty { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-muted); gap: 16px; animation: slideUp .6s ease; }
  .empty .icon-wrap { width: 80px; height: 80px; background: linear-gradient(135deg, rgba(124,58,237,0.1), rgba(167,139,250,0.1)); border-radius: 24px; display: flex; align-items: center; justify-content: center; animation: float 6s ease-in-out infinite; border: 1px solid var(--border); }
  .empty .icon-wrap .icon { font-size: 36px; }
  .empty h2 { font-size: 24px; font-weight: 700; color: var(--text); }
  .empty p { font-size: 14px; max-width: 420px; text-align: center; line-height: 1.7; }
  .empty .model-note { font-size: 12px; color: var(--accent); background: rgba(167,139,250,0.08); padding: 4px 14px; border-radius: 20px; }
  .empty .suggestions { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 4px; }
  .empty .suggestions button { background: var(--surface); border: 1px solid var(--border); color: var(--text-muted); font-size: 13px; padding: 8px 18px; border-radius: 20px; cursor: pointer; transition: all .3s ease; }
  .empty .suggestions button:hover { background: rgba(167,139,250,0.12); color: var(--accent); border-color: var(--accent); }
  #input-area { position: relative; z-index: 1; padding: 14px 24px 18px; background: var(--surface); backdrop-filter: blur(20px); border-top: 1px solid var(--border); flex-shrink: 0; }
  #input-row { display: flex; gap: 10px; align-items: flex-end; max-width: 900px; margin: 0 auto; }
  #input { flex: 1; background: rgba(255,255,255,0.04); backdrop-filter: blur(10px); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 18px; color: var(--text); font-size: 14px; font-family: var(--font); outline: none; resize: none; min-height: 48px; max-height: 140px; line-height: 1.5; transition: all .2s ease; }
  #input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
  #input::placeholder { color: #475569; }
  #send { background: linear-gradient(135deg,#7c3aed,#a78bfa); border: none; border-radius: var(--radius); padding: 12px 24px; color: #fff; font-size: 14px; font-weight: 600; cursor: pointer; transition: all .3s ease; white-space: nowrap; height: 48px; box-shadow: 0 4px 16px rgba(124,58,237,0.25); display: flex; align-items: center; gap: 6px; }
  #send:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(124,58,237,0.35); }
  #send:disabled { opacity: .4; cursor: not-allowed; transform: none; }
  @media (max-width: 640px) { header { padding: 12px 16px; } #chat { padding: 14px 16px; } .msg { max-width: 92%; } #input-area { padding: 12px 16px; } }
</style>
</head>
<body>
<div class="bg-shapes"><div class="shape"></div><div class="shape"></div><div class="shape"></div></div>

<header>
  <h1><span class="logo">&#x2699;</span> Anvar AI <span class="model-badge">Big Pickle</span></h1>
  <div class="header-actions">
    <button class="btn-outline" onclick="resetChat()">&#x21BB; New Chat</button>
  </div>
</header>

<div id="chat">
  <div class="empty" id="emptyState">
    <div class="icon-wrap"><span class="icon">&#x1F916;</span></div>
    <h2>Anvar AI</h2>
    <p>Coding agent powered by Big Pickle. I can write code, run commands, search the web, and manage git repos.</p>
    <div class="model-note">&#x26A1; Free via OpenCode Zen</div>
    <div class="suggestions">
      <button onclick="suggest('write a python prime number checker')">Prime checker</button>
      <button onclick="suggest('list files')">List files</button>
      <button onclick="suggest('search web for latest python news')">Search web</button>
      <button onclick="suggest('create a simple express.js server')">Express server</button>
    </div>
  </div>
</div>

<div id="input-area">
  <div id="input-row">
    <textarea id="input" rows="1" placeholder="Ask me to code..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage()}"></textarea>
    <button id="send" onclick="sendMessage()">Send &#x2192;</button>
  </div>
</div>

<script>
const API = window.location.origin;

async function sendMessage() {
  const input = document.getElementById('input');
  const text = input.value.trim();
  if (!text) return;
  document.getElementById('emptyState')?.remove();
  input.value = ''; input.style.height = 'auto';

  const chat = document.getElementById('chat');
  const userDiv = document.createElement('div'); userDiv.className = 'msg user';
  const userBubble = document.createElement('div'); userBubble.className = 'bubble'; userBubble.textContent = text;
  userDiv.appendChild(userBubble); chat.appendChild(userDiv);
  chat.scrollTop = chat.scrollHeight;

  const botDiv = document.createElement('div'); botDiv.className = 'msg bot';
  const botBubble = document.createElement('div'); botBubble.className = 'bubble';
  botDiv.appendChild(botBubble); chat.appendChild(botDiv);

  showTyping();

  const sendBtn = document.getElementById('send');
  sendBtn.disabled = true; input.disabled = true;

  try {
    const res = await fetch(API + '/chat/stream', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text }),
    });
    if (!res.ok) { const e = await res.text(); throw new Error(e.substring(0,150)); }
    removeTyping();

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop() || '';
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const data = JSON.parse(line.slice(6));
        if (data.type === 'text') botBubble.textContent += data.content;
        else if (data.type === 'tool') {
          const ti = document.createElement('div'); ti.className = 'tool-indicator';
          ti.textContent = '\u2699\uFE0F ' + data.name + ': ' + data.content.substring(0, 60);
          botDiv.appendChild(ti);
        } else if (data.type === 'error') botBubble.textContent += '\n[Error: ' + data.content + ']';
        chat.scrollTop = chat.scrollHeight;
      }
    }
  } catch (e) {
    removeTyping();
    botBubble.textContent += '\n[Error: ' + e.message + ']';
  }
  sendBtn.disabled = false; input.disabled = false;
  input.focus();
}

function showTyping() {
  const d = document.createElement('div'); d.className = 'typing-indicator'; d.id = 'typing';
  for (let i = 0; i < 3; i++) d.appendChild(document.createElement('span'));
  document.getElementById('chat').appendChild(d);
  document.getElementById('chat').scrollTop = document.getElementById('chat').scrollHeight;
}

function removeTyping() { document.getElementById('typing')?.remove(); }

function suggest(text) {
  document.getElementById('input').value = text;
  sendMessage();
}

function resetChat() {
  document.getElementById('chat').innerHTML = `
    <div class="empty" id="emptyState">
      <div class="icon-wrap"><span class="icon">&#x1F916;</span></div>
      <h2>Anvar AI</h2>
      <p>Coding agent powered by Big Pickle. I can write code, run commands, search the web, and manage git repos.</p>
      <div class="model-note">&#x26A1; Free via OpenCode Zen</div>
      <div class="suggestions">
        <button onclick="suggest('write a python prime number checker')">Prime checker</button>
        <button onclick="suggest('list files')">List files</button>
        <button onclick="suggest('search web for latest python news')">Search web</button>
        <button onclick="suggest('create a simple express.js server')">Express server</button>
      </div>
    </div>`;
  document.getElementById('input').focus();
}

document.getElementById('input').addEventListener('input', function() {
  this.style.height = 'auto'; this.style.height = Math.min(this.scrollHeight, 140) + 'px';
});
</script>
</body>
</html>
