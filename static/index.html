<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anvar AI - Coding Agent</title>
<script src="https://accounts.google.com/gsi/client"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  @keyframes gradientShift { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
  @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
  @keyframes pulse { 0%,100% { transform: scale(1); opacity: .5; } 50% { transform: scale(1.05); opacity: .8; } }
  @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes slideInLeft { from { opacity: 0; transform: translateX(-30px); } to { opacity: 1; transform: translateX(0); } }
  @keyframes slideInRight { from { opacity: 0; transform: translateX(30px); } to { opacity: 1; transform: translateX(0); } }
  @keyframes bounce { 0%,80%,100% { transform: translateY(0); } 40% { transform: translateY(-12px); } }

  :root {
    --bg: #f0f4ff; --surface: rgba(255,255,255,0.85); --border: rgba(99,102,241,0.15);
    --text: #1e1b4b; --text-muted: #6b7280; --accent: #6366f1; --accent-light: #a5b4fc;
    --user-bg: linear-gradient(135deg, #6366f1, #8b5cf6); --user-text: #fff;
    --bot-bg: rgba(255,255,255,0.9); --bot-border: rgba(99,102,241,0.2);
    --shadow: 0 4px 24px rgba(99,102,241,0.08);
    --shadow-hover: 0 8px 40px rgba(99,102,241,0.15);
    --font: 'Inter','Segoe UI',-apple-system,sans-serif; --radius: 16px; --radius-sm: 10px;
  }
  html,body { height: 100%; }
  body {
    font-family: var(--font); background: var(--bg);
    background-image: radial-gradient(ellipse at 10% 20%, rgba(99,102,241,0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 90% 80%, rgba(139,92,246,0.06) 0%, transparent 50%);
    color: var(--text); display: flex; flex-direction: column; overflow: hidden;
  }
  .bg-shapes { position: fixed; inset: 0; pointer-events: none; overflow: hidden; z-index: 0; }
  .bg-shapes .shape { position: absolute; border-radius: 50%; opacity: .1; }
  .bg-shapes .shape:nth-child(1) { width: 400px; height: 400px; background: linear-gradient(135deg,#6366f1,#a5b4fc); top: -100px; left: -100px; animation: float 8s ease-in-out infinite; }
  .bg-shapes .shape:nth-child(2) { width: 250px; height: 250px; background: linear-gradient(135deg,#8b5cf6,#c4b5fd); bottom: 50px; right: -50px; animation: float 10s ease-in-out infinite; animation-delay: -3s; }
  .bg-shapes .shape:nth-child(3) { width: 180px; height: 180px; background: linear-gradient(135deg,#a5b4fc,#6366f1); top: 40%; right: 15%; animation: pulse 6s ease-in-out infinite; }
  header {
    position: relative; z-index: 1; padding: 14px 24px;
    background: var(--surface); backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
  }
  header h1 { font-size: 18px; font-weight: 700; background: linear-gradient(135deg,#6366f1,#8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; display: flex; align-items: center; gap: 8px; }
  header h1 .logo { width: 32px; height: 32px; background: linear-gradient(135deg,#6366f1,#8b5cf6); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; -webkit-text-fill-color: white; }
  .header-actions { display: flex; align-items: center; gap: 10px; }
  #userInfo { display: none; align-items: center; gap: 8px; font-size: 13px; color: var(--text-muted); }
  #userInfo img { width: 28px; height: 28px; border-radius: 50%; }
  #userInfo .name { font-weight: 600; color: var(--text); }
  .btn-outline {
    background: rgba(99,102,241,0.08); border: 1px solid var(--border);
    color: var(--accent); font-weight: 600; padding: 7px 16px;
    border-radius: var(--radius-sm); cursor: pointer; font-size: 13px;
    transition: all .3s ease;
  }
  .btn-outline:hover { background: var(--accent); color: white; border-color: var(--accent); transform: translateY(-2px); box-shadow: var(--shadow-hover); }
  #chat {
    position: relative; z-index: 1; flex: 1; overflow-y: auto;
    padding: 20px 24px; display: flex; flex-direction: column; gap: 16px;
    scroll-behavior: smooth;
  }
  #chat::-webkit-scrollbar { width: 5px; }
  #chat::-webkit-scrollbar-thumb { background: var(--accent-light); border-radius: 3px; }
  .msg { display: flex; flex-direction: column; max-width: 78%; animation: slideUp .4s ease; }
  .msg.user { align-self: flex-end; animation-name: slideInRight; }
  .msg.bot { align-self: flex-start; animation-name: slideInLeft; }
  .msg .bubble { padding: 12px 18px; border-radius: var(--radius); font-size: 14px; line-height: 1.7; white-space: pre-wrap; word-wrap: break-word; box-shadow: var(--shadow); transition: all .3s ease; }
  .msg.user .bubble { background: var(--user-bg); color: var(--user-text); border-bottom-right-radius: 4px; }
  .msg.bot .bubble { background: var(--bot-bg); backdrop-filter: blur(10px); border: 1px solid var(--bot-border); border-bottom-left-radius: 4px; }
  .msg .bubble code { background: rgba(99,102,241,0.1); color: var(--accent); padding: 2px 6px; border-radius: 4px; font-size: 13px; }
  .msg .bubble pre { background: rgba(30,27,75,0.04); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px; margin: 8px 0; overflow-x: auto; font-size: 13px; }
  .msg .bubble pre code { background: none; padding: 0; color: inherit; }
  .tool-indicator { font-size: 12px; color: var(--accent); margin-top: 4px; padding: 4px 10px; background: rgba(99,102,241,0.08); border-radius: 6px; display: inline-block; }
  .typing-indicator { align-self: flex-start; display: flex; align-items: center; gap: 5px; padding: 14px 20px; background: var(--bot-bg); border: 1px solid var(--bot-border); border-radius: var(--radius); border-bottom-left-radius: 4px; box-shadow: var(--shadow); }
  .typing-indicator span { width: 9px; height: 9px; border-radius: 50%; background: var(--accent-light); animation: bounce 1.4s infinite; }
  .typing-indicator span:nth-child(2) { animation-delay: .16s; background: var(--accent); }
  .typing-indicator span:nth-child(3) { animation-delay: .32s; background: var(--accent-light); }
  .empty { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-muted); gap: 14px; animation: slideUp .6s ease; }
  .empty .icon-wrap { width: 80px; height: 80px; background: linear-gradient(135deg, rgba(99,102,241,0.1), rgba(139,92,246,0.1)); border-radius: 24px; display: flex; align-items: center; justify-content: center; animation: float 6s ease-in-out infinite; border: 1px solid var(--border); }
  .empty .icon-wrap .icon { font-size: 36px; }
  .empty h2 { font-size: 22px; font-weight: 700; background: linear-gradient(135deg,#6366f1,#8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .empty p { font-size: 14px; max-width: 400px; text-align: center; line-height: 1.6; }
  .empty .suggestions { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 6px; }
  .empty .suggestions button { background: var(--surface); border: 1px solid var(--border); color: var(--text-muted); font-size: 12px; padding: 7px 14px; border-radius: 20px; cursor: pointer; transition: all .3s ease; }
  .empty .suggestions button:hover { background: var(--accent); color: white; border-color: var(--accent); transform: translateY(-2px); }
  #input-area { position: relative; z-index: 1; padding: 14px 24px 18px; background: var(--surface); backdrop-filter: blur(20px); border-top: 1px solid var(--border); flex-shrink: 0; }
  #input-row { display: flex; gap: 10px; align-items: flex-end; max-width: 900px; margin: 0 auto; }
  #input { flex: 1; background: rgba(255,255,255,0.7); backdrop-filter: blur(10px); border: 2px solid var(--border); border-radius: var(--radius); padding: 12px 18px; color: var(--text); font-size: 14px; font-family: var(--font); outline: none; resize: none; min-height: 48px; max-height: 140px; line-height: 1.5; transition: all .3s ease; }
  #input:focus { border-color: var(--accent); box-shadow: 0 0 0 4px rgba(99,102,241,0.15); background: white; }
  #input::placeholder { color: #9ca3af; }
  #input:disabled { opacity: .5; }
  #send { background: linear-gradient(135deg,#6366f1,#8b5cf6); border: none; border-radius: var(--radius); padding: 12px 24px; color: #fff; font-size: 14px; font-weight: 600; cursor: pointer; transition: all .3s ease; white-space: nowrap; height: 48px; box-shadow: 0 4px 16px rgba(99,102,241,0.25); display: flex; align-items: center; gap: 6px; }
  #send:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(99,102,241,0.35); }
  #send:disabled { opacity: .4; cursor: not-allowed; transform: none; }
  .auth-banner { text-align: center; padding: 8px; font-size: 13px; background: rgba(99,102,241,0.06); border-bottom: 1px solid var(--border); color: var(--text-muted); position: relative; z-index: 1; display: flex; align-items: center; justify-content: center; gap: 10px; flex-wrap: wrap; }
  .auth-banner .key-input { padding: 4px 10px; border: 1px solid var(--border); border-radius: 6px; font-size: 12px; width: 220px; background: white; outline: none; }
  .auth-banner .key-input:focus { border-color: var(--accent); }
  @media (max-width: 640px) { header { padding: 12px 16px; } header h1 { font-size: 16px; } #chat { padding: 14px 16px; } .msg { max-width: 92%; } #input-area { padding: 12px 16px; } }
</style>
</head>
<body>
<div class="bg-shapes"><div class="shape"></div><div class="shape"></div><div class="shape"></div></div>

<header>
  <h1><span class="logo">&#x2699;</span> Anvar AI</h1>
  <div class="header-actions">
    <div id="userInfo">
      <img id="userAvatar" src="" alt="">
      <div><span class="name" id="userName"></span><br><span id="quotaInfo" style="font-size:11px;color:var(--success)">using your quota</span></div>
    </div>
    <button class="btn-outline" id="btnReset" onclick="resetChat()">&#x21BB;</button>
  </div>
</header>

<div id="authBanner" class="auth-banner">
  <span id="authMsg">No API key configured.</span>
  <span style="color:var(--text-muted)">Sign in with Google or paste an API key:</span>
  <input class="key-input" id="apiKeyInput" placeholder="Paste your Gemini API key..." onkeydown="if(event.key==='Enter')useApiKey()">
  <button class="btn-outline" id="btnUseKey" onclick="useApiKey()" style="font-size:12px;padding:4px 12px">Use Key</button>
</div>

<div id="chat">
  <div class="empty" id="emptyState">
    <div class="icon-wrap"><span class="icon">&#x1F916;</span></div>
    <h2>Anvar AI</h2>
    <p>Coding agent. I can write code, run commands, search the web, and manage git repos.</p>
    <div class="suggestions">
      <button onclick="suggest('write a python prime number checker')">Prime checker</button>
      <button onclick="suggest('list files')">List files</button>
      <button onclick="suggest('search web for latest python news')">Search web</button>
      <button onclick="suggest('create a simple express.js server')">Express server</button>
    </div>
  </div>
</div>

<div id="input-area">
  <div id="input-row">
    <textarea id="input" rows="1" placeholder="Ask me to code..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage()}" disabled></textarea>
    <button id="send" onclick="sendMessage()" disabled>Send &#x2192;</button>
  </div>
</div>

<script>
const API = window.location.origin;
let mode = 'server';
let googleAccessToken = null;
let userApiKey = localStorage.getItem('gemini_api_key') || '';

async function init() {
  const cfg = await (await fetch(API + '/config')).json();

  if (cfg.hasBigPickle) {
    mode = 'bigpickle';
    setAuthMsg('Big Pickle (free, via OpenCode Zen)');
    enableChat();
    return;
  }

  if (cfg.hasServerKey && !localStorage.getItem('no_server_key')) {
    mode = 'server';
    setAuthMsg('Gemini - shared server quota');
    enableChat();
    return;
  }

  if (userApiKey) {
    mode = 'apikey';
    setAuthMsg('Using your Gemini API key');
    enableChat();
    return;
  }

  // Show Google Sign-In button
  setAuthMsg(cfg.googleClientId ? 'Sign in to use your Gemini quota' : 'Enter a Gemini API key to continue');
  input.disabled = true;
  sendBtn.disabled = true;

  if (cfg.googleClientId) {
    const btn = document.createElement('div');
    google.accounts.id.initialize({ client_id: cfg.googleClientId, callback: () => {} });
    google.accounts.id.renderButton(btn, { type: 'standard', size: 'medium', text: 'signin_with', theme: 'outline' });
    btn.onclick = signInWithGoogle;
    document.querySelector('.auth-banner').insertBefore(btn, document.querySelector('.auth-banner').children[2]);
  }
}

function setAuthMsg(msg) { document.getElementById('authMsg').textContent = msg; }

function enableChat() {
  document.getElementById('input').disabled = false;
  document.getElementById('send').disabled = false;
  document.getElementById('input').focus();
}

function signInWithGoogle() {
  fetch(API + '/config').then(r => r.json()).then(cfg => {
    if (!cfg.googleClientId) return;
    google.accounts.oauth2.initTokenClient({
      client_id: cfg.googleClientId,
      scope: 'https://www.googleapis.com/auth/generative-language',
      callback: (resp) => {
        if (!resp.access_token) { alert('Sign-in failed'); return; }
        googleAccessToken = resp.access_token;
        mode = 'token';
        document.getElementById('authBanner').style.display = 'none';
        document.getElementById('userInfo').style.display = 'flex';
        document.getElementById('userName').textContent = 'You';
        enableChat();
      },
    }).requestAccessToken();
  });
}

function useApiKey() {
  const key = document.getElementById('apiKeyInput').value.trim();
  if (!key) return;
  userApiKey = key;
  localStorage.setItem('gemini_api_key', key);
  mode = 'apikey';
  document.getElementById('authBanner').style.display = 'none';
  enableChat();
}

function suggest(text) {
  document.getElementById('input').value = text;
  sendMessage();
}

async function sendMessage() {
  const input = document.getElementById('input');
  const text = input.value.trim();
  if (!text) return;
  document.getElementById('emptyState')?.remove();
  input.value = ''; input.style.height = 'auto';

  const chat = document.getElementById('chat');
  const userDiv = document.createElement('div'); userDiv.className = 'msg user';
  const userBubble = document.createElement('div'); userBubble.className = 'bubble'; userBubble.textContent = text;
  userDiv.appendChild(userBubble); chat.appendChild(userDiv);
  chat.scrollTop = chat.scrollHeight;

  const botDiv = document.createElement('div'); botDiv.className = 'msg bot';
  const botBubble = document.createElement('div'); botBubble.className = 'bubble';
  botDiv.appendChild(botBubble); chat.appendChild(botDiv);

  showTyping();

  const sendBtn = document.getElementById('send');
  sendBtn.disabled = true; input.disabled = true;

  try {
    let endpoint, body;
    if (mode === 'bigpickle') {
      endpoint = API + '/chat/bp/stream';
      body = { message: text };
    } else if (mode === 'token') {
      endpoint = API + '/chat/google/stream';
      body = { message: text, google_token: googleAccessToken };
    } else if (mode === 'apikey') {
      endpoint = API + '/chat/apikey/stream';
      body = { message: text, api_key: userApiKey };
    } else {
      endpoint = API + '/chat/stream';
      body = { message: text };
    }

    const res = await fetch(endpoint, {
      method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body)
    });
    if (!res.ok) {
      const errText = await res.text();
      throw new Error(errText.substring(0, 150));
    }
    removeTyping();

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop() || '';
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const data = JSON.parse(line.slice(6));
        if (data.type === 'text') botBubble.textContent += data.content;
        else if (data.type === 'tool') {
          const ti = document.createElement('div'); ti.className = 'tool-indicator';
          ti.textContent = '\u2699\uFE0F ' + data.name + ': ' + data.content.substring(0, 60);
          botDiv.appendChild(ti);
        } else if (data.type === 'error') botBubble.textContent += '\n[Error: ' + data.content + ']';
        chat.scrollTop = chat.scrollHeight;
      }
    }
  } catch (e) {
    removeTyping();
    botBubble.textContent += '\n[Error: ' + e.message + ']';
  }
  sendBtn.disabled = false; input.disabled = false;
  input.focus();
}

function showTyping() {
  const d = document.createElement('div'); d.className = 'typing-indicator'; d.id = 'typing';
  for (let i = 0; i < 3; i++) d.appendChild(document.createElement('span'));
  document.getElementById('chat').appendChild(d);
  document.getElementById('chat').scrollTop = document.getElementById('chat').scrollHeight;
}

function removeTyping() { document.getElementById('typing')?.remove(); }

async function resetChat() {
  if (mode === 'server') await fetch(API + '/reset', { method: 'POST' });
  document.getElementById('chat').innerHTML = '';
  document.getElementById('chat').innerHTML = `
    <div class="empty" id="emptyState">
      <div class="icon-wrap"><span class="icon">&#x1F916;</span></div>
      <h2>Anvar AI</h2>
      <p>Coding agent. I can write code, run commands, search the web, and manage git repos.</p>
      <div class="suggestions">
        <button onclick="suggest('write a python prime number checker')">Prime checker</button>
        <button onclick="suggest('list files')">List files</button>
        <button onclick="suggest('search web for latest python news')">Search web</button>
        <button onclick="suggest('create a simple express.js server')">Express server</button>
      </div>
    </div>`;
  document.getElementById('input').focus();
}

document.getElementById('input').addEventListener('input', function() {
  this.style.height = 'auto'; this.style.height = Math.min(this.scrollHeight, 140) + 'px';
});
</script>
</body>
</html>
