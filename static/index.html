<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anvar AI - Coding Agent</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  @keyframes gradientShift {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }
  @keyframes float {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    33% { transform: translateY(-20px) rotate(1deg); }
    66% { transform: translateY(10px) rotate(-1deg); }
  }
  @keyframes float2 {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    50% { transform: translateY(-15px) rotate(-2deg); }
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 0.5; }
    50% { transform: scale(1.05); opacity: 0.8; }
  }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(30px) scale(0.95); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }
  @keyframes slideInLeft {
    from { opacity: 0; transform: translateX(-30px); }
    to { opacity: 1; transform: translateX(0); }
  }
  @keyframes slideInRight {
    from { opacity: 0; transform: translateX(30px); }
    to { opacity: 1; transform: translateX(0); }
  }
  @keyframes shimmer {
    0% { background-position: -200% center; }
    100% { background-position: 200% center; }
  }
  @keyframes bounce {
    0%, 80%, 100% { transform: translateY(0); }
    40% { transform: translateY(-12px); }
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  :root {
    --bg: #f0f4ff;
    --surface: rgba(255,255,255,0.85);
    --surface-hover: rgba(255,255,255,0.95);
    --border: rgba(99,102,241,0.15);
    --text: #1e1b4b;
    --text-muted: #6b7280;
    --accent: #6366f1;
    --accent-light: #a5b4fc;
    --accent-glow: rgba(99,102,241,0.2);
    --user-bg: linear-gradient(135deg, #6366f1, #8b5cf6);
    --user-text: #fff;
    --bot-bg: rgba(255,255,255,0.9);
    --bot-border: rgba(99,102,241,0.2);
    --success: #10b981;
    --warning: #f59e0b;
    --shadow: 0 4px 24px rgba(99,102,241,0.08);
    --shadow-hover: 0 8px 40px rgba(99,102,241,0.15);
    --font: 'Inter', 'Segoe UI', -apple-system, sans-serif;
    --radius: 16px;
    --radius-sm: 10px;
  }

  html, body { height: 100%; }
  body {
    font-family: var(--font);
    background: var(--bg);
    background-image:
      radial-gradient(ellipse at 10% 20%, rgba(99,102,241,0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 90% 80%, rgba(139,92,246,0.06) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 50%, rgba(165,180,252,0.04) 0%, transparent 70%);
    color: var(--text);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .bg-shapes {
    position: fixed; inset: 0; pointer-events: none; overflow: hidden; z-index: 0;
  }
  .bg-shapes .shape {
    position: absolute; border-radius: 50%; opacity: 0.12;
  }
  .bg-shapes .shape:nth-child(1) {
    width: 400px; height: 400px; background: linear-gradient(135deg, #6366f1, #a5b4fc);
    top: -100px; left: -100px; animation: float 8s ease-in-out infinite;
  }
  .bg-shapes .shape:nth-child(2) {
    width: 250px; height: 250px; background: linear-gradient(135deg, #8b5cf6, #c4b5fd);
    bottom: 50px; right: -50px; animation: float2 10s ease-in-out infinite; animation-delay: -3s;
  }
  .bg-shapes .shape:nth-child(3) {
    width: 180px; height: 180px; background: linear-gradient(135deg, #a5b4fc, #6366f1);
    top: 40%; right: 15%; animation: pulse 6s ease-in-out infinite; animation-delay: -5s;
  }

  header {
    position: relative; z-index: 1;
    padding: 18px 28px;
    background: var(--surface);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    flex-shrink: 0;
    animation: fadeInUp 0.6s ease;
  }
  header h1 {
    font-size: 20px; font-weight: 700;
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    display: flex; align-items: center; gap: 10px;
  }
  header h1 .logo {
    width: 34px; height: 34px;
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    border-radius: 10px; display: flex; align-items: center; justify-content: center;
    font-size: 18px; -webkit-text-fill-color: white;
    animation: pulse 3s ease-in-out infinite;
  }
  .header-actions { display: flex; align-items: center; gap: 14px; }
  .status-badge {
    display: flex; align-items: center; gap: 6px;
    font-size: 13px; font-weight: 500; color: var(--text-muted);
    padding: 6px 14px; border-radius: 20px;
    background: rgba(16,185,129,0.1);
    border: 1px solid rgba(16,185,129,0.2);
  }
  .status-badge .dot {
    width: 8px; height: 8px; border-radius: 50%; background: var(--success);
    display: inline-block; animation: pulse 2s ease-in-out infinite;
  }
  .status-badge .dot.off { background: var(--warning); }
  .btn-reset {
    background: rgba(99,102,241,0.08);
    border: 1px solid var(--border);
    color: var(--accent); font-weight: 600;
    padding: 8px 18px; border-radius: var(--radius-sm);
    cursor: pointer; font-size: 13px;
    transition: all 0.3s ease;
  }
  .btn-reset:hover {
    background: var(--accent); color: white; border-color: var(--accent);
    transform: translateY(-2px); box-shadow: var(--shadow-hover);
  }

  #chat {
    position: relative; z-index: 1;
    flex: 1; overflow-y: auto;
    padding: 24px 28px;
    display: flex; flex-direction: column; gap: 18px;
    scroll-behavior: smooth;
  }
  #chat::-webkit-scrollbar { width: 6px; }
  #chat::-webkit-scrollbar-track { background: transparent; }
  #chat::-webkit-scrollbar-thumb { background: var(--accent-light); border-radius: 3px; }

  .msg {
    display: flex; flex-direction: column;
    max-width: 78%;
    animation: slideUp 0.5s ease;
  }
  .msg.user { align-self: flex-end; animation-name: slideInRight; }
  .msg.bot { align-self: flex-start; animation-name: slideInLeft; }
  .msg .bubble {
    padding: 14px 20px;
    border-radius: var(--radius);
    font-size: 14.5px; line-height: 1.7;
    white-space: pre-wrap; word-wrap: break-word;
    box-shadow: var(--shadow);
    transition: all 0.3s ease;
  }
  .msg.user .bubble {
    background: var(--user-bg);
    color: var(--user-text);
    border-bottom-right-radius: 4px;
  }
  .msg.user .bubble:hover { transform: translateY(-1px); box-shadow: var(--shadow-hover); }
  .msg.bot .bubble {
    background: var(--bot-bg);
    backdrop-filter: blur(10px);
    border: 1px solid var(--bot-border);
    border-bottom-left-radius: 4px;
  }
  .msg.bot .bubble:hover { transform: translateY(-1px); box-shadow: var(--shadow-hover); }
  .msg .bubble code {
    background: rgba(99,102,241,0.1);
    color: var(--accent);
    padding: 2px 7px; border-radius: 5px;
    font-size: 13.5px; font-weight: 500;
  }
  .msg .bubble pre {
    background: rgba(30,27,75,0.04);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 14px; margin: 10px 0;
    overflow-x: auto; font-size: 13px;
  }
  .msg .bubble pre code { background: none; padding: 0; color: inherit; }

  .tool-calls { margin-top: 8px; font-size: 12.5px; }
  .tool-call {
    background: rgba(255,255,255,0.7);
    backdrop-filter: blur(10px);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    margin-bottom: 5px; overflow: hidden;
    box-shadow: 0 2px 8px rgba(99,102,241,0.05);
    transition: all 0.3s ease;
  }
  .tool-call:hover { box-shadow: 0 4px 16px rgba(99,102,241,0.1); }
  .tool-call summary {
    padding: 8px 12px; cursor: pointer;
    color: var(--text-muted); display: flex;
    align-items: center; gap: 8px; font-size: 12.5px;
    transition: color 0.2s;
  }
  .tool-call summary:hover { color: var(--accent); }
  .tool-call summary::marker { color: var(--accent-light); }
  .tool-call .body {
    padding: 10px 12px; border-top: 1px solid var(--border);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px; color: var(--text-muted);
    white-space: pre-wrap; background: rgba(99,102,241,0.03);
  }

  .typing-indicator {
    align-self: flex-start;
    display: flex; align-items: center; gap: 5px;
    padding: 16px 22px;
    background: var(--bot-bg);
    backdrop-filter: blur(10px);
    border: 1px solid var(--bot-border);
    border-radius: var(--radius);
    border-bottom-left-radius: 4px;
    box-shadow: var(--shadow);
    animation: slideUp 0.3s ease;
  }
  .typing-indicator span {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--accent-light);
    animation: bounce 1.4s infinite ease-in-out;
  }
  .typing-indicator span:nth-child(2) { animation-delay: 0.16s; background: var(--accent); }
  .typing-indicator span:nth-child(3) { animation-delay: 0.32s; background: var(--accent-light); }

  .empty {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    color: var(--text-muted); gap: 16px;
    animation: fadeInUp 0.8s ease;
  }
  .empty .icon-wrap {
    width: 100px; height: 100px;
    background: linear-gradient(135deg, rgba(99,102,241,0.1), rgba(139,92,246,0.1));
    border-radius: 30px;
    display: flex; align-items: center; justify-content: center;
    animation: float 6s ease-in-out infinite;
    border: 1px solid var(--border);
  }
  .empty .icon-wrap .icon { font-size: 48px; }
  .empty h2 {
    font-size: 26px; font-weight: 700;
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .empty p { font-size: 15px; max-width: 440px; text-align: center; line-height: 1.7; color: var(--text-muted); }
  .empty .suggestions {
    display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 8px;
  }
  .empty .suggestions button {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-muted); font-size: 13px;
    padding: 8px 16px; border-radius: 20px;
    cursor: pointer; transition: all 0.3s ease;
  }
  .empty .suggestions button:hover {
    background: var(--accent); color: white; border-color: var(--accent);
    transform: translateY(-2px); box-shadow: var(--shadow-hover);
  }

  #input-area {
    position: relative; z-index: 1;
    padding: 18px 28px 22px;
    background: var(--surface);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
    animation: fadeInUp 0.6s ease;
  }
  #input-row {
    display: flex; gap: 12px;
    align-items: flex-end;
    max-width: 900px; margin: 0 auto;
  }
  #input {
    flex: 1;
    background: rgba(255,255,255,0.7);
    backdrop-filter: blur(10px);
    border: 2px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 20px;
    color: var(--text); font-size: 14.5px;
    font-family: var(--font);
    outline: none; resize: none;
    min-height: 52px; max-height: 160px;
    line-height: 1.6;
    transition: all 0.3s ease;
    box-shadow: 0 2px 8px rgba(99,102,241,0.04);
  }
  #input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 4px var(--accent-glow), 0 4px 16px rgba(99,102,241,0.1);
    background: white;
  }
  #input::placeholder { color: #9ca3af; }
  #send {
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    border: none; border-radius: var(--radius);
    padding: 14px 28px;
    color: #fff; font-size: 15px; font-weight: 600;
    cursor: pointer; transition: all 0.3s ease;
    white-space: nowrap; height: 52px;
    box-shadow: 0 4px 16px rgba(99,102,241,0.25);
    display: flex; align-items: center; gap: 8px;
  }
  #send:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(99,102,241,0.35);
  }
  #send:active { transform: translateY(0); }
  #send:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  @media (max-width: 640px) {
    header { padding: 14px 18px; }
    header h1 { font-size: 17px; }
    #chat { padding: 16px 18px; }
    .msg { max-width: 92%; }
    .msg .bubble { padding: 12px 16px; font-size: 14px; }
    #input-area { padding: 14px 18px 18px; }
    #send { padding: 14px 20px; }
    .bg-shapes .shape:nth-child(1) { width: 200px; height: 200px; }
    .bg-shapes .shape:nth-child(2) { width: 150px; height: 150px; }
    .bg-shapes .shape:nth-child(3) { display: none; }
  }
</style>
</head>
<body>
<div class="bg-shapes">
  <div class="shape"></div>
  <div class="shape"></div>
  <div class="shape"></div>
</div>

<header>
  <h1><span class="logo">&#x2699;</span> Anvar AI</h1>
  <div class="header-actions">
    <span class="status-badge"><span class="dot" id="statusDot"></span><span id="statusText">Online</span></span>
    <button class="btn-reset" onclick="resetChat()">&#x21BB; New Chat</button>
  </div>
</header>

<div id="chat">
  <div class="empty" id="emptyState">
    <div class="icon-wrap"><span class="icon">&#x1F916;</span></div>
    <h2>Anvar AI</h2>
    <p>Coding agent powered by Gemini. I can write code, run commands, search the web, and manage git repos.</p>
    <div class="suggestions">
      <button onclick="suggest('write a python script to check if a number is prime')">Write prime checker</button>
      <button onclick="suggest('list files in current directory')">List files</button>
      <button onclick="suggest('search web for latest python news')">Search web</button>
      <button onclick="suggest('create a simple express.js server')">Express.js server</button>
    </div>
  </div>
</div>

<div id="input-area">
  <div id="input-row">
    <textarea id="input" rows="1" placeholder="Ask me to code something..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage()}"></textarea>
    <button id="send" onclick="sendMessage()">Send &#x2192;</button>
  </div>
</div>

<script>
const API = window.location.origin;
let hasHistory = false;

function suggest(text) {
  document.getElementById('input').value = text;
  sendMessage();
}

async function sendMessage() {
  const input = document.getElementById('input');
  const text = input.value.trim();
  if (!text) return;

  document.getElementById('emptyState')?.remove();
  input.value = '';
  input.style.height = 'auto';
  addMessage(text, 'user');
  showTyping();

  const sendBtn = document.getElementById('send');
  sendBtn.disabled = true;

  // Create bot message bubble for streaming
  const chat = document.getElementById('chat');
  const msgDiv = document.createElement('div');
  msgDiv.className = 'msg bot';
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  msgDiv.appendChild(bubble);
  chat.appendChild(msgDiv);

  try {
    const res = await fetch(API + '/chat/stream', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text })
    });

    if (!res.ok) throw new Error('Server error');

    removeTyping();
    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop() || '';

      for (const line of lines) {
        if (line.startsWith('data: ')) {
          const data = JSON.parse(line.slice(6));
          if (data.type === 'text') {
            bubble.textContent += data.content;
            chat.scrollTop = chat.scrollHeight;
          } else if (data.type === 'tool') {
            // Show tool calls inline
            const toolInfo = document.createElement('div');
            toolInfo.style.cssText = 'font-size:12px;color:#6366f1;margin-top:4px;padding:4px 10px;background:rgba(99,102,241,0.08);border-radius:6px;';
            toolInfo.textContent = '\u2699\uFE0F ' + data.name + ': ' + data.content.substring(0, 60) + '...';
            bubble.after(toolInfo);
          } else if (data.type === 'error') {
            bubble.textContent = data.content;
          }
        }
      }
    }
    hasHistory = true;
  } catch (e) {
    removeTyping();
    bubble.textContent = 'Error: ' + e.message;
  }
  sendBtn.disabled = false;
  input.focus();
}

function addMessage(text, role) {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.textContent = text;
  div.appendChild(bubble);
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function showTyping() {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = 'typing-indicator';
  div.id = 'typing';
  for (let i = 0; i < 3; i++) {
    const span = document.createElement('span');
    div.appendChild(span);
  }
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typing');
  if (t) t.remove();
}

async function resetChat() {
  try {
    await fetch(API + '/reset', { method: 'POST' });
  } catch (e) {}
  document.getElementById('chat').innerHTML = '';
  hasHistory = false;
  document.getElementById('chat').innerHTML = `
    <div class="empty" id="emptyState">
      <div class="icon-wrap"><span class="icon">&#x1F916;</span></div>
      <h2>Anvar AI</h2>
      <p>Coding agent powered by Gemini. I can write code, run commands, search the web, and manage git repos.</p>
      <div class="suggestions">
        <button onclick="suggest('write a python script to check if a number is prime')">Write prime checker</button>
        <button onclick="suggest('list files in current directory')">List files</button>
        <button onclick="suggest('search web for latest python news')">Search web</button>
        <button onclick="suggest('create a simple express.js server')">Express.js server</button>
      </div>
    </div>`;
  document.getElementById('input').focus();
}

async function checkHealth() {
  try {
    const res = await fetch(API + '/health');
    if (res.ok) {
      document.getElementById('statusDot').className = 'dot';
      document.getElementById('statusText').textContent = 'Online';
    } else throw new Error();
  } catch {
    document.getElementById('statusDot').className = 'dot off';
    document.getElementById('statusText').textContent = 'Offline';
  }
}
checkHealth();
setInterval(checkHealth, 30000);
document.getElementById('input').focus();

document.getElementById('input').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 160) + 'px';
});
</script>
</body>
</html>
