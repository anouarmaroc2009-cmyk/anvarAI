<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anvar AI - Coding Agent</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  @keyframes float { 0%,100% { transform: translateY(0) rotate(0deg); } 33% { transform: translateY(-15px) rotate(1deg); } 66% { transform: translateY(-5px) rotate(-1deg); } }
  @keyframes pulse { 0%,100% { transform: scale(1); opacity: .4; } 50% { transform: scale(1.08); opacity: .7; } }
  @keyframes slideUp { from { opacity: 0; transform: translateY(25px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes slideInLeft { from { opacity: 0; transform: translateX(-25px); } to { opacity: 1; transform: translateX(0); } }
  @keyframes slideInRight { from { opacity: 0; transform: translateX(25px); } to { opacity: 1; transform: translateX(0); } }
  @keyframes bounce { 0%,80%,100% { transform: translateY(0); } 40% { transform: translateY(-10px); } }
  @keyframes shimmer { 0% { background-position: -200% center; } 100% { background-position: 200% center; } }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }

  :root {
    --bg: #ffffff; --surface: rgba(255,255,255,0.8); --surface-hover: rgba(255,255,255,0.9);
    --border: rgba(0,0,0,0.08); --border-hover: rgba(0,0,0,0.15);
    --text: #0f172a; --text-muted: #64748b; --text-dim: #94a3b8;
    --accent: #a78bfa; --accent-glow: rgba(167,139,250,0.15);
    --accent-2: #7c3aed; --accent-gradient: linear-gradient(135deg, #7c3aed, #a78bfa);
    --user-bg: linear-gradient(135deg, #7c3aed, #a78bfa); --user-text: #fff;
    --bot-bg: rgba(255,255,255,0.8); --bot-border: rgba(167,139,250,0.2);
    --shadow: 0 4px 24px rgba(0,0,0,0.06);
    --font: 'Inter','Segoe UI',-apple-system,sans-serif; --radius: 16px; --radius-sm: 10px; --radius-full: 999px;
  }
  html,body { height: 100%; }
  body {
    font-family: var(--font); background: var(--bg); color: var(--text);
    display: flex; flex-direction: column; overflow: hidden;
    transition: background .4s, color .4s;
  }

  .bg-shapes { position: fixed; inset: 0; pointer-events: none; overflow: hidden; z-index: 0; }
  .bg-shapes .shape { position: absolute; border-radius: 50%; transition: all .6s; }
  .bg-shapes .shape:nth-child(1) { width: 520px; height: 520px; background: radial-gradient(circle, rgba(124,58,237,0.06), transparent 70%); top: -200px; left: -120px; animation: float 12s ease-in-out infinite; }
  .bg-shapes .shape:nth-child(2) { width: 350px; height: 350px; background: radial-gradient(circle, rgba(167,139,250,0.05), transparent 70%); bottom: 30px; right: -80px; animation: float 14s ease-in-out infinite; animation-delay: -5s; }
  .bg-shapes .shape:nth-child(3) { width: 200px; height: 200px; background: radial-gradient(circle, rgba(99,102,241,0.04), transparent 70%); top: 35%; left: 60%; animation: pulse 9s ease-in-out infinite; }
  .bg-shapes .shape:nth-child(4) { width: 150px; height: 150px; background: radial-gradient(circle, rgba(236,72,153,0.04), transparent 70%); bottom: 40%; left: 10%; animation: float 11s ease-in-out infinite; animation-delay: -2s; }

  header {
    position: relative; z-index: 10; padding: 12px 20px;
    background: var(--surface); backdrop-filter: blur(24px);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
    gap: 12px;
  }
  header .left { display: flex; align-items: center; gap: 12px; }
  header h1 { font-size: 17px; font-weight: 700; color: var(--text); display: flex; align-items: center; gap: 10px; letter-spacing: -.3px; }
  header h1 .logo { width: 30px; height: 30px; background: var(--accent-gradient); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 15px; color: white; box-shadow: 0 2px 12px rgba(124,58,237,0.3); }
  .header-actions { display: flex; align-items: center; gap: 6px; }

  .icon-btn {
    width: 34px; height: 34px; border-radius: var(--radius-sm); border: 1px solid var(--border);
    background: transparent; color: var(--text-muted); cursor: pointer; display: flex;
    align-items: center; justify-content: center; font-size: 16px; transition: all .25s;
  }
  .icon-btn:hover { background: var(--surface-hover); color: var(--text); border-color: var(--border-hover); transform: translateY(-1px); }
  .icon-btn.active { background: var(--accent-glow); border-color: var(--accent); color: var(--accent); }

  /* Settings panel */
  #settingsPanel {
    position: fixed; top: 0; right: -360px; width: 320px; height: 100%; z-index: 100;
    background: var(--surface); backdrop-filter: blur(32px);
    border-left: 1px solid var(--border); padding: 20px;
    transition: right .35s cubic-bezier(.4,0,.2,1);
    display: flex; flex-direction: column; gap: 16px; overflow-y: auto;
  }
  #settingsPanel.open { right: 0; }
  #settingsPanel .close { align-self: flex-end; }
  #settingsPanel h2 { font-size: 15px; font-weight: 600; color: var(--text); }
  #settingsPanel .group { display: flex; flex-direction: column; gap: 8px; }
  #settingsPanel .group label { font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: .5px; }
  #settingsPanel .group .row { display: flex; gap: 8px; flex-wrap: wrap; }
  .color-swatch {
    width: 36px; height: 36px; border-radius: var(--radius-sm); border: 2px solid transparent;
    cursor: pointer; transition: all .2s; position: relative;
  }
  .color-swatch:hover { transform: scale(1.12); }
  .color-swatch.active { border-color: white; box-shadow: 0 0 12px rgba(255,255,255,0.2); }
  .color-swatch.active::after { content: '\2713'; position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; color: white; font-size: 14px; font-weight: 700; }

  .settings-overlay { position: fixed; inset: 0; z-index: 90; background: rgba(0,0,0,0.4); opacity: 0; pointer-events: none; transition: opacity .3s; }
  .settings-overlay.show { opacity: 1; pointer-events: auto; }

  #chat {
    position: relative; z-index: 1; flex: 1; overflow-y: auto;
    padding: 20px 24px; display: flex; flex-direction: column; gap: 14px;
    scroll-behavior: smooth;
  }
  #chat::-webkit-scrollbar { width: 4px; }
  #chat::-webkit-scrollbar-thumb { background: rgba(167,139,250,0.25); border-radius: 3px; }
  #chat::-webkit-scrollbar-track { background: transparent; }
  .msg { display: flex; flex-direction: column; max-width: 80%; animation: slideUp .35s ease; }
  .msg.user { align-self: flex-end; animation-name: slideInRight; }
  .msg.bot { align-self: flex-start; animation-name: slideInLeft; }
  .msg .bubble { padding: 14px 20px; border-radius: var(--radius); font-size: 14px; line-height: 1.7; white-space: pre-wrap; word-wrap: break-word; }
  .msg.user .bubble { background: var(--user-bg); color: var(--user-text); border-bottom-right-radius: 4px; }
  .msg.bot .bubble { background: var(--bot-bg); backdrop-filter: blur(10px); border: 1px solid var(--bot-border); border-bottom-left-radius: 4px; box-shadow: var(--shadow); }
  .msg .bubble code { background: rgba(167,139,250,0.15); color: var(--accent); padding: 2px 6px; border-radius: 4px; font-size: 13px; }
  .msg .bubble pre { background: rgba(0,0,0,0.35); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 14px; margin: 8px 0; overflow-x: auto; font-size: 13px; }
  .msg .bubble pre code { background: none; padding: 0; color: inherit; }
  .tool-indicator {
    font-size: 12px; color: var(--accent); margin-top: 4px; padding: 4px 10px;
    background: rgba(167,139,250,0.08); border-radius: 6px; display: inline-block;
    animation: fadeIn .2s ease;
  }
  .typing-indicator { align-self: flex-start; display: flex; align-items: center; gap: 5px; padding: 16px 22px; background: var(--bot-bg); border: 1px solid var(--bot-border); border-radius: var(--radius); border-bottom-left-radius: 4px; box-shadow: var(--shadow); animation: slideUp .25s ease; }
  .typing-indicator span { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); animation: bounce 1.4s infinite; opacity: .3; }
  .typing-indicator span:nth-child(2) { animation-delay: .16s; opacity: .5; }
  .typing-indicator span:nth-child(3) { animation-delay: .32s; opacity: .7; }
  .empty { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--text-muted); gap: 14px; animation: slideUp .5s ease; }
  .empty .icon-wrap { width: 72px; height: 72px; background: linear-gradient(135deg, rgba(124,58,237,0.1), rgba(167,139,250,0.08)); border-radius: 22px; display: flex; align-items: center; justify-content: center; border: 1px solid var(--border); animation: float 7s ease-in-out infinite; }
  .empty .icon-wrap .icon { font-size: 32px; }
  .empty h2 { font-size: 22px; font-weight: 700; color: var(--text); letter-spacing: -.3px; }
  .empty p { font-size: 14px; max-width: 400px; text-align: center; line-height: 1.6; }
  .empty .suggestions { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 4px; }
  .empty .suggestions button {
    background: var(--surface); border: 1px solid var(--border); color: var(--text-muted);
    font-size: 13px; padding: 7px 18px; border-radius: 20px; cursor: pointer;
    transition: all .25s; position: relative; overflow: hidden;
  }
  .empty .suggestions button:hover { background: rgba(167,139,250,0.1); color: var(--accent); border-color: var(--accent); transform: translateY(-2px); }
  #input-area { position: relative; z-index: 1; padding: 12px 20px 16px; background: var(--surface); backdrop-filter: blur(24px); border-top: 1px solid var(--border); flex-shrink: 0; }
  #input-row { display: flex; gap: 10px; align-items: flex-end; max-width: 900px; margin: 0 auto; }
  #input {
    flex: 1; background: rgba(255,255,255,0.04); backdrop-filter: blur(10px);
    border: 1px solid var(--border); border-radius: var(--radius);
    padding: 11px 16px; color: var(--text); font-size: 14px; font-family: var(--font);
    outline: none; resize: none; min-height: 44px; max-height: 130px; line-height: 1.5; transition: all .25s;
  }
  #input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); background: rgba(255,255,255,0.06); }
  #input::placeholder { color: var(--text-dim); }
  #send {
    background: var(--accent-gradient); border: none; border-radius: var(--radius);
    padding: 11px 22px; color: #fff; font-size: 14px; font-weight: 600; cursor: pointer;
    transition: all .25s; white-space: nowrap; height: 44px; display: flex; align-items: center; gap: 6px;
    box-shadow: 0 4px 16px rgba(124,58,237,0.25);
  }
  #send:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(124,58,237,0.35); }
  #send:disabled { opacity: .35; cursor: not-allowed; transform: none; }

  @media (max-width: 640px) {
    header { padding: 10px 14px; } #chat { padding: 12px 14px; } .msg { max-width: 92%; } #input-area { padding: 10px 14px 14px; }
  }
</style>
</head>
<body>
<div class="bg-shapes" id="bgShapes"><div class="shape"></div><div class="shape"></div><div class="shape"></div><div class="shape"></div></div>
<div class="settings-overlay" id="settingsOverlay" onclick="toggleSettings()"></div>

<header>
  <div class="left">
    <h1><span class="logo">&#x2699;</span> Anvar AI</h1>
  </div>
  <div class="header-actions">
    <button class="icon-btn" onclick="toggleSettings()" id="settingsBtn" title="Customize">&#x2699;</button>
    <button class="icon-btn" onclick="resetChat()" title="New chat">&#x21BB;</button>
  </div>
</header>

<div id="settingsPanel">
  <button class="icon-btn close" onclick="toggleSettings()" style="margin-bottom:4px">&#x2715;</button>
  <h2>Customize</h2>
  <div class="group">
    <label>Accent Color</label>
    <div class="row" id="accentColors">
      <div class="color-swatch active" style="background:#a78bfa" data-color="#a78bfa" onclick="setAccent('#a78bfa',this)"></div>
      <div class="color-swatch" style="background:#6366f1" data-color="#6366f1" onclick="setAccent('#6366f1',this)"></div>
      <div class="color-swatch" style="background:#06b6d4" data-color="#06b6d4" onclick="setAccent('#06b6d4',this)"></div>
      <div class="color-swatch" style="background:#10b981" data-color="#10b981" onclick="setAccent('#10b981',this)"></div>
      <div class="color-swatch" style="background:#f59e0b" data-color="#f59e0b" onclick="setAccent('#f59e0b',this)"></div>
      <div class="color-swatch" style="background:#ef4444" data-color="#ef4444" onclick="setAccent('#ef4444',this)"></div>
      <div class="color-swatch" style="background:#ec4899" data-color="#ec4899" onclick="setAccent('#ec4899',this)"></div>
      <div class="color-swatch" style="background:linear-gradient(135deg,#7c3aed,#a78bfa)" data-color="gradient" onclick="setAccent('gradient',this)"></div>
    </div>
  </div>
  <div class="group">
    <label>Background</label>
    <div class="row" id="bgOptions">
      <div class="color-swatch active" style="background:#ffffff;border:2px solid #cbd5e1" data-bg="#ffffff" data-theme="light" onclick="setBg('#ffffff',this)"></div>
      <div class="color-swatch" style="background:#f1f5f9;border:2px solid #cbd5e1" data-bg="#f1f5f9" data-theme="light" onclick="setBg('#f1f5f9',this)"></div>
      <div class="color-swatch" style="background:#e0f2fe;border:2px solid #bae6fd" data-bg="#e0f2fe" data-theme="light" onclick="setBg('#e0f2fe',this)"></div>
      <div class="color-swatch" style="background:#fce7f3;border:2px solid #fbcfe8" data-bg="#fce7f3" data-theme="light" onclick="setBg('#fce7f3',this)"></div>
      <div class="color-swatch" style="background:#0a0a1a" data-bg="#0a0a1a" data-theme="dark" onclick="setBg('#0a0a1a',this)"></div>
      <div class="color-swatch" style="background:#0f172a" data-bg="#0f172a" data-theme="dark" onclick="setBg('#0f172a',this)"></div>
      <div class="color-swatch" style="background:#1a1a2e" data-bg="#1a1a2e" data-theme="dark" onclick="setBg('#1a1a2e',this)"></div>
      <div class="color-swatch" style="background:#111827" data-bg="#111827" data-theme="dark" onclick="setBg('#111827',this)"></div>
    </div>
  </div>
  <div class="group">
    <label>Animations</label>
    <div class="row">
      <button class="icon-btn" style="width:auto;padding:6px 14px;font-size:12px" onclick="toggleAnimations()" id="animToggle">On</button>
    </div>
  </div>
</div>

<div id="chat">
  <div class="empty" id="emptyState">
    <div class="icon-wrap"><span class="icon">&#x1F916;</span></div>
    <h2>Anvar AI</h2>
    <p>Coding agent. I can write code, run commands, search the web, and manage git repos.</p>
    <div class="suggestions">
      <button onclick="suggest('write a python prime number checker')">Prime checker</button>
      <button onclick="suggest('list files')">List files</button>
      <button onclick="suggest('search web for latest python news')">Search web</button>
      <button onclick="suggest('create a simple express.js server')">Express server</button>
    </div>
  </div>
</div>

<div id="input-area">
  <div id="input-row">
    <textarea id="input" rows="1" placeholder="Ask me to code..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage()}"></textarea>
    <button id="send" onclick="sendMessage()">Send &#x2192;</button>
  </div>
</div>

<script>
const API = window.location.origin;
let animEnabled = true;

function loadSettings() {
  const accent = localStorage.getItem('anvar_accent');
  const bg = localStorage.getItem('anvar_bg');
  const anim = localStorage.getItem('anvar_anim');
  if (!bg) {
    document.querySelector('#bgOptions .color-swatch').classList.add('active');
    document.body.style.background = '#ffffff';
  }
  if (accent) {
    document.querySelectorAll('#accentColors .color-swatch').forEach(s => s.classList.remove('active'));
    const target = document.querySelector(`#accentColors .color-swatch[data-color="${accent}"]`);
    if (target) { target.classList.add('active'); applyAccent(accent); }
    else { applyAccent(accent); }
  }
  if (bg) {
    document.querySelectorAll('#bgOptions .color-swatch').forEach(s => s.classList.remove('active'));
    const target = document.querySelector(`#bgOptions .color-swatch[data-bg="${bg}"]`);
    if (target) target.classList.add('active');
    document.body.style.background = bg;
  }
  if (anim === 'off') { animEnabled = false; document.getElementById('animToggle').textContent = 'Off'; toggleAnimations(true); }
}
loadSettings();

function applyAccent(color) {
  const root = document.documentElement;
  if (color === 'gradient') {
    root.style.setProperty('--accent', '#a78bfa');
    root.style.setProperty('--accent-2', '#7c3aed');
    root.style.setProperty('--accent-gradient', 'linear-gradient(135deg, #7c3aed, #a78bfa)');
    root.style.setProperty('--user-bg', 'linear-gradient(135deg, #7c3aed, #a78bfa)');
  } else {
    root.style.setProperty('--accent', color);
    root.style.setProperty('--accent-2', color);
    root.style.setProperty('--accent-gradient', `linear-gradient(135deg, ${color}, ${color}dd)`);
    root.style.setProperty('--user-bg', `linear-gradient(135deg, ${color}, ${color}dd)`);
  }
  root.style.setProperty('--accent-glow', `${color}22`);
  root.style.setProperty('--bot-border', `${color}33`);
}

function setAccent(color, el) {
  document.querySelectorAll('#accentColors .color-swatch').forEach(s => s.classList.remove('active'));
  el.classList.add('active');
  applyAccent(color);
  localStorage.setItem('anvar_accent', color);
}

function setBg(color, el) {
  document.querySelectorAll('#bgOptions .color-swatch').forEach(s => s.classList.remove('active'));
  el.classList.add('active');
  const theme = el.dataset.theme || 'dark';
  const root = document.documentElement;
  if (theme === 'light') {
    root.style.setProperty('--bg', color);
    root.style.setProperty('--text', '#0f172a');
    root.style.setProperty('--text-muted', '#64748b');
    root.style.setProperty('--text-dim', '#94a3b8');
    root.style.setProperty('--surface', 'rgba(255,255,255,0.8)');
    root.style.setProperty('--surface-hover', 'rgba(255,255,255,0.95)');
    root.style.setProperty('--border', 'rgba(0,0,0,0.08)');
    root.style.setProperty('--border-hover', 'rgba(0,0,0,0.15)');
    root.style.setProperty('--bot-bg', 'rgba(255,255,255,0.8)');
    root.style.setProperty('--shadow', '0 4px 24px rgba(0,0,0,0.06)');
    document.querySelector('.empty h2').style.color = '';
  } else {
    root.style.setProperty('--bg', color);
    root.style.setProperty('--text', '#e2e8f0');
    root.style.setProperty('--text-muted', '#94a3b8');
    root.style.setProperty('--text-dim', '#475569');
    root.style.setProperty('--surface', 'rgba(255,255,255,0.04)');
    root.style.setProperty('--surface-hover', 'rgba(255,255,255,0.07)');
    root.style.setProperty('--border', 'rgba(255,255,255,0.08)');
    root.style.setProperty('--border-hover', 'rgba(255,255,255,0.15)');
    root.style.setProperty('--bot-bg', 'rgba(255,255,255,0.04)');
    root.style.setProperty('--shadow', '0 4px 24px rgba(0,0,0,0.3)');
  }
  document.body.style.background = color;
  localStorage.setItem('anvar_bg', color);
}

function toggleAnimations(skipSave) {
  animEnabled = !animEnabled;
  const btn = document.getElementById('animToggle');
  btn.textContent = animEnabled ? 'On' : 'Off';
  const shapes = document.getElementById('bgShapes');
  const chat = document.getElementById('chat');
  const empty = document.getElementById('emptyState');
  if (animEnabled) {
    shapes.style.display = '';
    chat.style.scrollBehavior = 'smooth';
    if (empty) empty.style.animation = '';
  } else {
    shapes.style.display = 'none';
    chat.style.scrollBehavior = 'auto';
  }
  if (!skipSave) localStorage.setItem('anvar_anim', animEnabled ? 'on' : 'off');
}

function toggleSettings() {
  document.getElementById('settingsPanel').classList.toggle('open');
  document.getElementById('settingsOverlay').classList.toggle('show');
}

async function sendMessage() {
  const input = document.getElementById('input');
  const text = input.value.trim();
  if (!text) return;
  document.getElementById('emptyState')?.remove();
  input.value = ''; input.style.height = 'auto';

  const chat = document.getElementById('chat');
  const userDiv = document.createElement('div'); userDiv.className = 'msg user';
  const userBubble = document.createElement('div'); userBubble.className = 'bubble'; userBubble.textContent = text;
  userDiv.appendChild(userBubble); chat.appendChild(userDiv);
  chat.scrollTop = chat.scrollHeight;

  const botDiv = document.createElement('div'); botDiv.className = 'msg bot';
  const botBubble = document.createElement('div'); botBubble.className = 'bubble';
  botDiv.appendChild(botBubble); chat.appendChild(botDiv);

  showTyping();

  const sendBtn = document.getElementById('send');
  sendBtn.disabled = true; input.disabled = true;

  try {
    const res = await fetch(API + '/chat/stream', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text }),
    });
    if (!res.ok) { const e = await res.text(); throw new Error(e.substring(0,150)); }
    removeTyping();

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop() || '';
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const data = JSON.parse(line.slice(6));
        if (data.type === 'text') botBubble.textContent += data.content;
        else if (data.type === 'tool') {
          const ti = document.createElement('div'); ti.className = 'tool-indicator';
          ti.textContent = '\u2699\uFE0F ' + data.name + ': ' + data.content.substring(0, 60);
          botDiv.appendChild(ti);
        } else if (data.type === 'error') botBubble.textContent += '\n[Error: ' + data.content + ']';
        chat.scrollTop = chat.scrollHeight;
      }
    }
  } catch (e) {
    removeTyping();
    botBubble.textContent += '\n[Error: ' + e.message + ']';
  }
  sendBtn.disabled = false; input.disabled = false;
  input.focus();
}

function showTyping() {
  const d = document.createElement('div'); d.className = 'typing-indicator'; d.id = 'typing';
  for (let i = 0; i < 3; i++) d.appendChild(document.createElement('span'));
  document.getElementById('chat').appendChild(d);
  document.getElementById('chat').scrollTop = document.getElementById('chat').scrollHeight;
}

function removeTyping() { document.getElementById('typing')?.remove(); }

function suggest(text) {
  document.getElementById('input').value = text;
  sendMessage();
}

function resetChat() {
  document.getElementById('chat').innerHTML = `
    <div class="empty" id="emptyState">
      <div class="icon-wrap"><span class="icon">&#x1F916;</span></div>
      <h2>Anvar AI</h2>
    <p>Meet Anvar AI—a cutting-edge intelligence engineered for precision and performance. Developed by a visionary web developer and trader, Anvar AI is designed to streamline complex workflows and provide high-level analytical insights. It is the ultimate tool for those who demand efficiency and excellence in their digital projects and market navigation.</p>
      <div class="suggestions">
        <button onclick="suggest('write a python prime number checker')">Prime checker</button>
        <button onclick="suggest('list files')">List files</button>
        <button onclick="suggest('search web for latest python news')">Search web</button>
        <button onclick="suggest('create a simple express.js server')">Express server</button>
      </div>
    </div>`;
  document.getElementById('input').focus();
}

document.getElementById('input').addEventListener('input', function() {
  this.style.height = 'auto'; this.style.height = Math.min(this.scrollHeight, 130) + 'px';
});
</script>
