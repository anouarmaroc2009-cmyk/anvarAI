<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anvar AI - Coding Agent</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --border: #30363d;
    --text: #e6edf3;
    --text-muted: #8b949e;
    --accent: #58a6ff;
    --accent-glow: rgba(88, 166, 255, 0.15);
    --user-bg: #1f6feb;
    --user-text: #fff;
    --bot-bg: #21262d;
    --success: #3fb950;
    --warning: #d29922;
    --font: 'Segoe UI', -apple-system, sans-serif;
    --radius: 12px;
  }
  html, body { height: 100%; }
  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    display: flex;
    flex-direction: column;
  }
  header {
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    background: var(--surface);
  }
  header h1 {
    font-size: 18px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  header h1 span { color: var(--accent); }
  header .status {
    font-size: 13px;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--success);
    display: inline-block;
  }
  .dot.off { background: var(--warning); }
  .btn-reset {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-muted);
    padding: 6px 14px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    transition: .2s;
  }
  .btn-reset:hover {
    border-color: var(--accent);
    color: var(--accent);
  }
  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 20px 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .msg {
    display: flex;
    flex-direction: column;
    max-width: 80%;
    animation: fadeIn .3s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .msg.user { align-self: flex-end; }
  .msg.bot { align-self: flex-start; }
  .msg .bubble {
    padding: 12px 16px;
    border-radius: var(--radius);
    font-size: 14px;
    line-height: 1.6;
    white-space: pre-wrap;
    word-wrap: break-word;
  }
  .msg.user .bubble {
    background: var(--user-bg);
    color: var(--user-text);
    border-bottom-right-radius: 4px;
  }
  .msg.bot .bubble {
    background: var(--bot-bg);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
  }
  .msg .bubble code {
    background: rgba(255,255,255,0.08);
    padding: 1px 5px;
    border-radius: 4px;
    font-size: 13px;
  }
  .msg .bubble pre {
    background: #0d1117;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
    margin: 8px 0;
    overflow-x: auto;
    font-size: 13px;
  }
  .msg .bubble pre code { background: none; padding: 0; }
  .tool-calls {
    margin-top: 6px;
    font-size: 12px;
  }
  .tool-call {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    margin-bottom: 4px;
    overflow: hidden;
  }
  .tool-call summary {
    padding: 6px 10px;
    cursor: pointer;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
  }
  .tool-call summary:hover { color: var(--text); }
  .tool-call .body {
    padding: 8px 10px;
    border-top: 1px solid var(--border);
    font-family: monospace;
    font-size: 12px;
    color: var(--text-muted);
    white-space: pre-wrap;
  }
  .typing {
    align-self: flex-start;
    display: flex;
    gap: 4px;
    padding: 12px 16px;
    background: var(--bot-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    border-bottom-left-radius: 4px;
  }
  .typing span {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--text-muted);
    animation: bounce 1.4s infinite;
  }
  .typing span:nth-child(2) { animation-delay: .2s; }
  .typing span:nth-child(3) { animation-delay: .4s; }
  @keyframes bounce {
    0%, 80%, 100% { transform: scale(0.6); opacity: .4; }
    40% { transform: scale(1); opacity: 1; }
  }
  #input-area {
    padding: 16px 24px;
    border-top: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }
  #input-row {
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }
  #input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 16px;
    color: var(--text);
    font-size: 14px;
    font-family: var(--font);
    outline: none;
    resize: none;
    min-height: 48px;
    max-height: 160px;
    line-height: 1.5;
    transition: border-color .2s;
  }
  #input:focus { border-color: var(--accent); }
  #input::placeholder { color: var(--text-muted); }
  #send {
    background: var(--accent);
    border: none;
    border-radius: 8px;
    padding: 12px 20px;
    color: #fff;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: .2s;
    white-space: nowrap;
    height: 48px;
  }
  #send:hover { background: #79c0ff; }
  #send:disabled { opacity: .5; cursor: not-allowed; }
  .empty {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: var(--text-muted);
    gap: 12px;
  }
  .empty h2 { font-size: 22px; font-weight: 600; color: var(--text); }
  .empty p { font-size: 14px; max-width: 400px; text-align: center; line-height: 1.6; }
  .empty .icon { font-size: 48px; opacity: .3; }
  @media (max-width: 600px) {
    header { padding: 12px 16px; }
    header h1 { font-size: 16px; }
    #chat { padding: 12px 16px; }
    .msg { max-width: 90%; }
    #input-area { padding: 12px 16px; }
    #send { padding: 12px 16px; }
  }
</style>
</head>
<body>
<header>
  <h1>&#x2699; Anvar <span>AI</span></h1>
  <div style="display:flex;align-items:center;gap:12px">
    <span class="status"><span class="dot" id="statusDot"></span><span id="statusText">Connected</span></span>
    <button class="btn-reset" onclick="resetChat()">New Chat</button>
  </div>
</header>
<div id="chat">
  <div class="empty" id="emptyState">
    <div class="icon">&#x1F916;</div>
    <h2>Anvar AI Coding Agent</h2>
    <p>I can read and write files, run commands, search the web, and manage git repos. What do you want to build?</p>
  </div>
</div>
<div id="input-area">
  <div id="input-row">
    <textarea id="input" rows="1" placeholder="Ask me to code something..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage()}"></textarea>
    <button id="send" onclick="sendMessage()">Send</button>
  </div>
</div>

<script>
const API = window.location.origin;
let hasHistory = false;

async function sendMessage() {
  const input = document.getElementById('input');
  const text = input.value.trim();
  if (!text) return;

  document.getElementById('emptyState')?.remove();
  input.value = '';
  input.style.height = 'auto';
  addMessage(text, 'user');
  showTyping();

  const sendBtn = document.getElementById('send');
  sendBtn.disabled = true;

  try {
    const res = await fetch(API + '/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text })
    });
    const data = await res.json();
    removeTyping();
    addMessage(data.response, 'bot');
    hasHistory = true;
  } catch (e) {
    removeTyping();
    addMessage('Error: ' + e.message, 'bot');
  }
  sendBtn.disabled = false;
  input.focus();
}

function addMessage(text, role) {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.textContent = text;
  div.appendChild(bubble);
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function showTyping() {
  const chat = document.getElementById('chat');
  const div = document.createElement('div');
  div.className = 'typing';
  div.id = 'typing';
  for (let i = 0; i < 3; i++) {
    const span = document.createElement('span');
    div.appendChild(span);
  }
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typing');
  if (t) t.remove();
}

async function resetChat() {
  try {
    await fetch(API + '/reset', { method: 'POST' });
  } catch (e) {}
  document.getElementById('chat').innerHTML = '';
  hasHistory = false;
  document.getElementById('chat').innerHTML = `
    <div class="empty" id="emptyState">
      <div class="icon">&#x1F916;</div>
      <h2>Anvar AI Coding Agent</h2>
      <p>I can read and write files, run commands, search the web, and manage git repos. What do you want to build?</p>
    </div>`;
  document.getElementById('input').focus();
}

async function checkHealth() {
  try {
    const res = await fetch(API + '/health');
    if (res.ok) {
      document.getElementById('statusDot').className = 'dot';
      document.getElementById('statusText').textContent = 'Connected';
    } else {
      throw new Error();
    }
  } catch {
    document.getElementById('statusDot').className = 'dot off';
    document.getElementById('statusText').textContent = 'Offline';
  }
}
checkHealth();
setInterval(checkHealth, 30000);
document.getElementById('input').focus();

// Auto-resize textarea
document.getElementById('input').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 160) + 'px';
});
</script>
</body>
</html>
